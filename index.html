<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>القيصر للإعلام الآلي</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #d1f6ff;
      color: #083170;
      min-height: 100vh;
      padding: 30px 16px 60px;
    }

    .container {
      width: 100%;
      max-width: 580px;
      margin: 0 auto;
      text-align: center;
    }

    .profile-image {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      margin: 0 auto 18px;
      border: 4px solid #ffffff;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
      background: white;
    }

    .username {
      font-size: 15px;
      font-weight: bold;
      margin-bottom: 8px;
      color: #083170;
    }

    h1 {
      font-size: 30px;
      margin-bottom: 10px;
      color: #083170;
    }

    .bio {
      font-size: 16px;
      line-height: 1.8;
      margin-bottom: 28px;
      color: #083170;
    }

    .section-title {
      text-align: right;
      font-size: 15px;
      font-weight: bold;
      margin: 24px 0 12px;
      color: #083170;
    }

    .link-card {
      display: block;
      width: 100%;
      text-decoration: none;
      background: #ffffff;
      color: #083170;
      border-radius: 12px;
      padding: 18px 20px;
      margin-bottom: 14px;
      box-shadow: 0 6px 18px rgba(8, 49, 112, 0.10);
      border: 1px solid rgba(8, 49, 112, 0.08);
      font-size: 17px;
      font-weight: bold;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .link-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(8, 49, 112, 0.16);
    }

    .footer-space {
      height: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="images/alqaysar.jpg" alt="القيصر" class="profile-image" />

    <div class="username">@alqaysarinfo39</div>
    <h1>القيصر للإعلام الآلي</h1>
    <p class="bio">مع القيصر اشعر دائما انك الأفضل</p>

    <div class="section-title">مواقع التواصل</div>
   <a class="link-card" href="https://www.instagram.com/alqaysar_info39" target="_blank">Instagram</a>
<a class="link-card" href="https://www.facebook.com/elqayserinfo" target="_blank">Facebook</a>
<a class="link-card" href="https://www.tiktok.com/@alqayser.info" target="_blank">TikTok</a>

<div class="section-title">التطبيقات</div>
<a class="link-card" href="https://files.catbox.moe/pzp2ji.apk" target="_blank">نتفلي</a>
<a class="link-card" href="#" target="_blank">التطبيق 2</a>
<a class="link-card" href="#" target="_blank">التطبيق 3</a>
<a class="link-card" href="#" target="_blank">التطبيق 4</a>

    <div class="footer-space"></div>
  </div>
</body>
</html>
